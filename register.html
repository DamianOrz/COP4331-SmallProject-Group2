<html>
<head>
    <title>COP 4331 - Register</title>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="css/register.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
</head>
<body>

<div id="loginDiv">
    <div class="icon-container">
        <i class="fa-solid fa-circle-user" id="main-avatar"></i>
    </div>

    <h1 id="title">Contact Manager</h1>
    <span id="inner-title">Create your Account</span>

    <div class = "input-row">
        <div class = "input-group">
            <label for="firstName">First Name:</label>
            <div class="input-wrapper simple-input">
                <input type="text" id="firstName" placeholder="John" />
            </div>
        </div>

        <div class = "input-group">
            <label for="lastName">Last Name:</label>
            <div class="input-wrapper simple-input">
                <input type="text" id="lastName" placeholder="Doe" />
            </div>
        </div>
    </div>

    <div class="input-group full-width">
        <label for="loginName">Username:</label>
        <div class="input-wrapper simple-input">
            <input type="text" id="loginName" placeholder="ex. johndoe03" />
        </div>
    </div>

    <div class="input-group full-width">
        <label for="loginPassword">Password:</label>
        <div class="input-wrapper">
            <input type="password" id="loginPassword" placeholder="....." />
        </div>
    </div>

    <button type="button" id="registerButton" class="buttons" onclick="doRegister();"> Register </button>

    
    <div class = "footer-text">
        Already have an account? <span id="loginLink" class="registerLink" onclick="window.location.href='index.html';">Sign in.</span>
    </div>

    <span id="loginResult"></span>


</div>

</body>
</html>

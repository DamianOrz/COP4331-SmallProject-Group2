<html>
<head>
    <title>COP 4331 - Contacts</title>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">

    <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function() 
    {
        readCookie();
    }, false);
    </script>
</head>
<body>

<h1 id="title">Contact Manager</h1>

<div id="loggedInDiv">
    <span id="userName"></span><br />
    <button type="button" id="logoutButton" class="buttons" onclick="doLogout();"> Log Out </button>
</div>

<div id="accessUIDiv">

    <input type="text" id="searchText" placeholder="Search Contacts" />
    <button type="button" class="buttons" onclick="searchContact();"> Search </button><br />
    <p id="contactList"></p>

    <br />

    <input type="text" id="firstNameText" placeholder="First Name" /><br />
    <input type="text" id="lastNameText" placeholder="Last Name" /><br />
    <input type="text" id="emailText" placeholder="Email" /><br />
    <input type="text" id="phoneText" placeholder="Phone Number" /><br />
    <button type="button" class="buttons" onclick="addContact();"> Add Contact </button><br />
    <span id="contactAddResult"></span>

</div>

</body>
</html>
